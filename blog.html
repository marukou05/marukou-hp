<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブログ一覧 | 株式会社丸幸</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #002147;
            --gold: #c5a059;
            --white: #ffffff;
            --text: #333;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; scroll-padding-top: 80px; }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            color: var(--text);
            line-height: 1.7;
            background: #f4f7f9;
            font-size: 16px; /* 基本文字サイズを16pxに拡大 */
        }

        .main-container {
            width: 100%;
            max-width: 1600px;
            margin: 0 auto;
            background: #fff;
        }

        /* --- ナビゲーション --- */
        .top-nav {
            background: rgba(255, 255, 255, 0.98);
            padding: 15px 0;
            border-bottom: 2px solid var(--navy);
            position: sticky;
            top: 0;
            z-index: 1100;
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }
        .logo-text-nav {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.6rem;
            color: var(--navy);
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.05em;
        }
        .nav-links a {
            margin-left: 18px;
            text-decoration: none;
            color: var(--navy);
            font-weight: 700;
            font-size: 0.95rem;
            transition: 0.3s;
        }
        .nav-links a:hover { color: var(--gold); }

        /* --- 下層共通ヘッダー --- */
        .sub-header {
            background: linear-gradient(rgba(0,33,71,0.8), rgba(0,33,71,0.8)), url('https://images.unsplash.com/photo-1455390582262-044cdead277a?q=80&w=2000');
            background-size: cover; background-position: center;
            padding: 50px 20px; text-align: center; color: #fff;
        }
        .sub-header h2 { font-family: 'Noto Serif JP', serif; font-size: 2.2rem; margin: 0 0 10px 0; }
        .sub-header p { font-size: 1.05rem; margin: 0; color: #ddd; }

        /* --- コンテンツエリア --- */
        .content-wrap { padding: 60px 20px; max-width: 1000px; margin: 0 auto; }

        /* ブログリストスタイル */
        .blog-list { list-style: none; padding: 0; margin: 0; }
        .blog-item { 
            background: #fff; 
            border: 1px solid #e1e8f0; 
            padding: 25px; 
            margin-bottom: 20px; 
            border-radius: 4px;
            transition: 0.3s;
            display: block;
            text-decoration: none;
            color: inherit;
        }
        .blog-item:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            border-color: var(--gold);
        }
        
        .blog-meta { display: flex; gap: 15px; margin-bottom: 8px; font-size: 0.95rem; color: #777; }
        .blog-date { font-weight: 500; }
        .blog-category { color: var(--gold); font-weight: 700; }
        
        .blog-item h3 { 
            margin: 0 0 10px 0; 
            color: var(--navy); 
            font-size: 1.35rem; 
            font-weight: 700;
            line-height: 1.4;
        }
        .blog-item p { margin: 0; color: #555; font-size: 1.05rem; line-height: 1.6; }

        /* --- お問い合わせ兼フッター --- */
        .contact-footer { padding: 70px 20px; background: #fff; text-align: center; border-top: 1px solid #eee; }
        .contact-footer p.lead-text { font-weight: 700; color: var(--navy); margin: 0; font-size: 1.3rem; }
        .footer-tel { 
            font-size: clamp(2.2rem, 7vw, 3.5rem);
            font-weight: 700; 
            color: var(--navy); 
            text-decoration: none; 
            display: block; 
            margin: 20px 0; 
            transition: 0.3s; 
            font-family: 'Helvetica', sans-serif;
        }
        .footer-tel:hover { color: var(--gold); }
        .btn-gold { 
            background: var(--gold); 
            color: #fff !important; 
            padding: 18px 60px;
            text-decoration: none; 
            border-radius: 4px; 
            font-weight: 700; 
            font-size: 1.25rem; 
            display: inline-block; 
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
        }
        .btn-gold:hover { background: var(--navy); transform: translateY(-2px); }
        .copyright { font-size: 0.95rem; color: #888; margin-top: 40px; letter-spacing: 0.05em; }

        /* スマホ対応 */
        @media (max-width: 768px) {
            body { font-size: 15px; }
            .nav-container { flex-direction: column; gap: 12px; padding: 10px 20px; }
            .nav-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; }
            .nav-links a { margin: 4px 8px; font-size: 0.85rem; }
            .sub-header { padding: 40px 15px; }
            .sub-header h2 { font-size: 1.8rem; }
            .content-wrap { padding: 40px 15px; }
            .blog-item { padding: 20px; }
            .blog-item h3 { font-size: 1.2rem; }
            .blog-item p { font-size: 0.95rem; }
            .btn-gold { width: 100%; max-width: 400px; padding: 16px 0; font-size: 1.15rem; }
        }
    </style>
</head>
